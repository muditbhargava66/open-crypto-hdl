# ============================================================
# .github/workflows/ci.yml
# CI: lint → simulate → synthesize → formal (optional)
# ============================================================

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────
  lint:
    name: Verilator Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator

      - name: Run make lint
        run: make lint

  # ─────────────────────────────────────────────────────────
  simulate-cocotb:
    name: cocotb Simulation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y iverilog
          pip install cocotb cocotb-test pytest pycryptodome

      - name: Run all cocotb tests
        run: make cocotb-all

      - name: Upload simulation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-logs
          path: |
            results.xml
            sim_build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  synthesize:
    name: Yosys Synthesis & Area Report
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y yosys

      - name: Run make synth-all
        run: make synth-all

      - name: Upload synthesis reports
        uses: actions/upload-artifact@v4
        with:
          name: synth-netlists
          path: "build/*_netlist.v"

  # ─────────────────────────────────────────────────────────
  sv2v-check:
    name: sv2v Compatibility Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y verilator
          wget -q https://github.com/zachjs/sv2v/releases/latest/download/sv2v-Linux.zip
          unzip sv2v-Linux.zip
          sudo mv sv2v /usr/local/bin/

      - name: Convert SV → Verilog
        run: |
          mkdir -p compatible
          sv2v src/chacha20_qr.v src/chacha20_core.v \
            -w compatible/chacha20_core.v

      - name: Verify converted Verilog lints
        run: verilator --lint-only -Wall compatible/chacha20_core.v

  # ─────────────────────────────────────────────────────────
  tinytapeout-check:
    name: TinyTapeout Wrapper Sanity
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y yosys

      - name: Elaborate TT wrapper
        run: make synth-tt

      - name: Check pin compliance
        run: |
          grep -E "ui_in|uo_out|uio_in|uio_out|uio_oe|ena|clk|rst_n" \
            src/tt_um_crypto_top.v | head -20

  # ─────────────────────────────────────────────────────────
  formal:
    name: Formal Verification (SymbiYosys)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup OSS CAD Suite
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ChaCha20 BMC
        run: make formal-chacha

      - name: Run AES BMC
        run: sby -f tb/formal/aes_formal.sby

      - name: Upload formal results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-results
          path: |
            tb/formal/chacha20_formal/
            tb/formal/aes_formal/
